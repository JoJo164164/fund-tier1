name: 建置 SITCA 基金淨值歷史庫

# 讓使用者可在 GitHub 網頁 Actions 分頁手動按「Run workflow」觸發
on:
  workflow_dispatch:
    inputs:
      companies:
        description: '★填 ALL =一次查所有公司(最快,請求數1/36)★ ｜留空=逐家抓36家 ｜填代碼=只抓指定家'
        required: false
        default: 'ALL'
      days_back:
        description: '往回抓幾個營業日。驗證用 5；建1年約250；建15年填 3800'
        required: true
        default: '250'
      skip_recent:
        description: '跳過最近幾個營業日(避開境外淨值未齊,隔天4點後才齊)。預設2'
        required: true
        default: '2'
      start_date:
        description: '起始日 YYYYMMDD(留空=從今天往回跳skip_recent天)。續抓更早歷史往前調'
        required: false
        default: ''
      filter_companies:
        description: '【篩選】只存哪些投信(逗號分隔代碼,如 A0036,A0032)。留空=全部'
        required: false
        default: ''
      filter_assets:
        description: '【篩選】只存哪些資產類型：股票型,債券型,平衡型,ETF,主動式ETF,貨幣市場,指數型,組合型,不動產證券化,ETF連結基金。留空=全部'
        required: false
        default: ''
      filter_regions:
        description: '【篩選】只存哪些投資區域：台灣,中國,美國,日本,印度,越南,韓國,亞洲,歐洲,拉丁美洲,新興市場,全球。留空=全部'
        required: false
        default: ''
      time_budget:
        description: '本次最多跑幾分鐘(上限360,建議300留緩衝)'
        required: true
        default: '300'

# 讓 workflow 能把抓到的 CSV commit 回 repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 低於 GitHub 硬上限 360，留緩衝
    steps:
      - name: 取出 repo
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝相依
        run: pip install requests

      - name: 執行建庫腳本
        env:
          SITCA_COMPANIES: ${{ github.event.inputs.companies }}
          SITCA_DAYS_BACK: ${{ github.event.inputs.days_back }}
          SITCA_SKIP_RECENT: ${{ github.event.inputs.skip_recent }}
          SITCA_START: ${{ github.event.inputs.start_date }}
          SITCA_TIME_BUDGET: ${{ github.event.inputs.time_budget }}
          FILTER_COMPANIES: ${{ github.event.inputs.filter_companies }}
          FILTER_ASSETS: ${{ github.event.inputs.filter_assets }}
          FILTER_REGIONS: ${{ github.event.inputs.filter_regions }}
        run: python build_sitca.py

      - name: 提交結果回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "無新資料，略過提交"
          else
            git commit -m "建庫: SITCA 淨值增量 ($(date +%Y-%m-%d_%H:%M))"
            git push
          fi
