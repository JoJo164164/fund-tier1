name: 建置 境外基金 雙源淨值庫

on:
  workflow_dispatch:
    inputs:
      source:
        description: '資料源：both(三源容錯:Yahoo→yfinance→MoneyDJ) / yahoo / yfinance / moneydj'
        required: true
        default: 'both'
      codes:
        description: '★填 ALL =自動抓全市場境外基金清單★ ｜留空=5檔測試 ｜或填代碼'
        required: false
        default: 'ALL'
      years:
        description: '抓幾年歷史(yfinance適用)'
        required: true
        default: '15'
      time_budget:
        description: '本次最多跑幾分鐘(上限360，建議300留緩衝)'
        required: true
        default: '300'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 取出 repo
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝相依
        run: pip install requests yfinance

      - name: 執行境外建庫
        env:
          PYTHONUNBUFFERED: '1'   # 即時輸出log，不緩衝
          OFFSHORE_SOURCE: ${{ github.event.inputs.source }}
          OFFSHORE_CODES: ${{ github.event.inputs.codes }}
          OFFSHORE_YEARS: ${{ github.event.inputs.years }}
          TIME_BUDGET_MIN: ${{ github.event.inputs.time_budget }}
        run: python build_offshore.py

      - name: 提交結果回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "無新資料"
          else
            git commit -m "境外建庫: 三源淨值增量 ($(date +%Y-%m-%d_%H:%M))"
            # 防衝突：另一個workflow可能同時commit，先rebase再push，最多試5次
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push衝突，第 $i 次重試…"; sleep $((RANDOM % 10 + 5))
            done
          fi
